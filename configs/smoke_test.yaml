experiment:
  name: "smoke_test"
  seed: 42

dataset:
  name: "aa_lcr"
  samples: 2  # Small sample
  domains: ["Legal"]

systems:
  - name: "stub_system"
    type: "stub"
    command: []

metrics:
  - exact_match
  - soft_recall
  - verbosity
  - latency_s

judges:
  strategy: "fixed"
  fixed:
    provider: "openai"
    model: "gpt-4"
  templates:
    correctness: "default"
    hallucination: "default"

statistics:
  bootstrap_resamples: 100
  alpha: 0.05
  primary_test: "wilcoxon_one_tailed"
  secondary_test: "wilcoxon_two_tailed"

output:
  runs_dir: "./runs"
  log_level: "INFO"
