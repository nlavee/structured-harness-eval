# GLASS config: Model ablation — Structured Harness across all model backends
experiment:
  name: "structured_harness_model_ablation"
  seed: 42

dataset:
  name: "aa_lcr"
  dataset_folder: "data/AA-LCR/AA-LCR_extracted-text/lcr"
  samples: null 
  domains: null

systems:
  - name: "structured_harness_claude"
    type: "structured_harness"
    model: "sonnet"
    harness_config: "single_turn_qa"
    timeout_s: 600
    env: {}

  - name: "structured_harness_gemini"
    type: "structured_harness"
    model: "gemini-2.0-flash"
    harness_config: "single_turn_qa"
    timeout_s: 600
    env: {}

  - name: "structured_harness_gpt"
    type: "structured_harness"
    model: "gpt-4.1"
    harness_config: "single_turn_qa"
    timeout_s: 600
    env: {}

metrics:
  - exact_match
  - soft_recall
  - judge_score
  - hallucination_rate
  - latency_s
  - verbosity
  - refusal_rate
  - error_rate

judges:
  strategy: "fixed"
  fixed:
    provider: "openai"
    model: "gpt-4.1"
  templates:
    correctness: "aa_lcr_equality"
    hallucination: "nli_sentence"

statistics:
  bootstrap_resamples: 10000
  alpha: 0.05
  primary_test: "wilcoxon_one_tailed"
  secondary_test: "wilcoxon_two_tailed"

output:
  runs_dir: "./runs"
  log_level: "INFO"
