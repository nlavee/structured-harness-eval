experiment:
  name: "gemini_25_flash_full_test"
  seed: 42

dataset:
  name: "aa_lcr"
  dataset_folder: "data/AA-LCR/AA-LCR_extracted-text/lcr"
  samples: null
  domains: null

systems:
  - name: "gemini-cli"
    type: "gemini"
    model: "gemini-2.5-flash"
    command: null
    timeout_s: 600
    env: {}

metrics:
  - exact_match
  - soft_recall
  - soft_f1
  - judge_score
  - hallucination_rate
  - latency_s
  - verbosity
  - refusal_rate
  - error_rate
  - answer_length
  - citation_presence
  - confidence_score
  - answer_completeness
  - reasoning_depth
  - response_consistency

  - rouge_score_f1
  - rouge_score_recall
  - bert_score_f1

metric_args:
  bert_score_f1:
    model_type: "distilbert-base-uncased"

judges:
  strategy: "fixed"
  fixed:
    provider: "openai"
    model: "gpt-4o-mini-2024-07-18"
  templates:
    correctness: "aa_lcr_equality"
    hallucination: "nli_sentence"

statistics:
  bootstrap_resamples: 100
  alpha: 0.05
  primary_test: "wilcoxon_one_tailed"
  secondary_test: "wilcoxon_two_tailed"

output:
  runs_dir: "./runs"
  log_level: "INFO"
