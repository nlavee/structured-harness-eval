name: Smoke Test

on:
  pull_request:
    branches:
      - master
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          
      - name: Create virtual environment and install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install -e .[test]
          pip install pytest
          
      - name: Install Robo
        run: |
          mkdir -p bin
          curl -sfL https://github.com/tj/robo/releases/download/v0.5.4/robo_linux_amd64 -o bin/robo
          chmod +x bin/robo
          
      - name: Run Unit Tests
        run: |
          PYTHONPATH=. venv/bin/pytest tests/
          
      - name: Run Pipeline Smoke Test
        run: |
          # Robo automatically explicitly activates the venv internal to its shell execution
          bin/robo eval:run configs/smoke_test.yaml
